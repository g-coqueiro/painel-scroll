<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Scroll Site</title>

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #EDF1F6;
        }

        iframe {
            width: 100%;
            border: 0;
            display: block;

            /*
               Altura total do conteúdo do site embarcado em pixels.
               Abra o site no navegador, pressione F12 → Console e rode:
               document.documentElement.scrollHeight
               Cole o valor aqui (ex: 4200px).
            */
            height: 5942px;
        }
    </style>

</head>

<body>

    <!-- Aqui você define qual site quer manter na tela -->
    <iframe id="frame" src="https://whitebox.isso.digital/UwiGFDAXcl5v/"></iframe>

    <script>
        const IFRAME_HEIGHT_PX = 5942; // <- mesmo valor do height no CSS
        const SCROLL_DURATION_MS = 250000; // 70 segundos por sentido

        const frame = document.getElementById('frame');

        let startTime = null;
        let direction = 1; // 1 = descendo, -1 = subindo
        let currentY = 0;

        function animate(timestamp) {
            if (startTime === null) startTime = timestamp;

            // Calcula o scroll máximo em tempo real (adapta a qualquer tela)
            const maxScroll = IFRAME_HEIGHT_PX - window.innerHeight;

            const elapsed = timestamp - startTime;
            const progress = Math.min(elapsed / SCROLL_DURATION_MS, 1);

            if (direction === 1) {
                currentY = -progress * maxScroll;
            } else {
                currentY = -(1 - progress) * maxScroll;
            }

            frame.style.transform = `translateY(${currentY}px)`;

            if (progress >= 1) {
                direction *= -1;
                startTime = null;
            }

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>

</body>

</html>
